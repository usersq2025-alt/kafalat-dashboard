<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة رصد الكفالات المزدوجة</title>
<style>
:root{
  --bg:#f4f6f9;--card:#fff;--ink:#1f2d3d;--muted:#6b7a8d;--navy:#1F4E78;--line:#e3e8ef;
  --red:#FFC7CE;--redInk:#9c1f2e;--redBar:#e74c5e;--yellow:#FFEB9C;--yellowInk:#8a6d00;--yellowBar:#e0b400;
  --green:#E2EFDA;--greenInk:#3f7032;--greenBar:#5fa84e;--grey:#eceef1;--greyInk:#5a6675;--greyBar:#9aa6b5;
  --orph:#FCE4D6;--edu:#DDEBF7;--orphBar:#ed7d31;--eduBar:#4a90d9;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",Tahoma,Arial,sans-serif;background:var(--bg);color:var(--ink);padding:18px;line-height:1.55}
#gate{position:fixed;inset:0;background:linear-gradient(135deg,#1F4E78,#2c6aa0);display:flex;align-items:center;justify-content:center;z-index:9999}
#gate .box{background:#fff;border-radius:16px;padding:34px 30px;width:320px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
#gate h2{color:#1F4E78;font-size:20px;margin-bottom:6px}#gate p{color:#6b7a8d;font-size:13px;margin-bottom:20px}
#gate input{width:100%;padding:12px 14px;border:1px solid #e3e8ef;border-radius:10px;font-size:14px;margin-bottom:12px;font-family:inherit;text-align:right}
#gate input:focus{outline:none;border-color:#1F4E78}
#gate button{width:100%;padding:12px;background:#1F4E78;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
#gate button:hover{background:#163a5a}#gate .err{color:#e74c5e;font-size:13px;min-height:18px;margin-bottom:8px}
#app{display:none}
.head{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.head h1{font-size:22px;color:var(--navy)}.head p{color:var(--muted);font-size:13px;margin-top:4px}
.sync{font-size:12px;padding:6px 12px;border-radius:20px;background:#eef1f5;color:var(--muted)}
.sync.on{background:#E2EFDA;color:var(--greenInk)}.sync.off{background:#FFEB9C;color:var(--yellowInk)}
.secTitle{font-size:13px;font-weight:700;color:var(--muted);margin:6px 2px 8px;display:flex;align-items:center;gap:8px}
.secTitle::after{content:"";flex:1;height:1px;background:var(--line)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:11px;margin-bottom:8px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;cursor:pointer;transition:.15s;border-right:5px solid var(--line)}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.08)}
.card.active{box-shadow:0 0 0 2px var(--navy) inset}
.card .num{font-size:28px;font-weight:800}.card .lbl{font-size:12px;color:var(--muted);margin-top:3px;min-height:32px}
.card.r{border-right-color:var(--redBar)}.card.r .num{color:var(--redInk)}
.card.y{border-right-color:var(--yellowBar)}.card.y .num{color:var(--yellowInk)}
.card.g{border-right-color:var(--greenBar)}.card.g .num{color:var(--greenInk)}
.card.k{border-right-color:var(--greyBar)}.card.k .num{color:var(--greyInk)}
.card.all{border-right-color:var(--navy)}.card.all .num{color:var(--navy)}
.card.o{border-right-color:var(--orphBar)}.card.o .num{color:#b5591e}
.card.e{border-right-color:var(--eduBar)}.card.e .num{color:#2f6cad}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:16px 0 14px}
.search{flex:1;min-width:220px}.search input{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit}
.search input:focus{outline:none;border-color:var(--navy)}
.count{font-size:13px;color:var(--muted)}
.btn{padding:9px 14px;border:1px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;font-size:13px;font-family:inherit;color:var(--ink)}
.btn:hover{background:#f0f3f7}
.row{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
.rhead{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;flex-wrap:wrap}
.rhead:hover{background:#fafbfc}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.b-r{background:var(--red);color:var(--redInk)}.b-y{background:var(--yellow);color:var(--yellowInk)}
.b-g{background:var(--green);color:var(--greenInk)}.b-k{background:var(--grey);color:var(--greyInk)}
.amt{font-size:12px;font-weight:800;padding:3px 10px;border-radius:8px;white-space:nowrap}
.amt-hi{background:#FFC7CE;color:var(--redInk)}.amt-lo{background:#FFEB9C;color:var(--yellowInk)}.amt-ok{background:#E2EFDA;color:var(--greenInk)}
.surp{font-size:11px;padding:2px 9px;border-radius:6px;white-space:nowrap}
.surp-o{background:var(--orph);color:#b5591e}.surp-e{background:var(--edu);color:#2f6cad}.surp-x{background:#eef1f5;color:var(--muted)}
.name{font-weight:700;font-size:15px;flex:1;min-width:130px}
.total{font-size:15px;font-weight:800;color:var(--navy)}
.mini{font-size:11.5px;color:var(--muted)}
.conf{font-size:11px;padding:2px 8px;border-radius:6px;background:#eef1f5;color:var(--muted)}.conf.low{background:#fff3cd;color:#8a6d00}
.chev{margin-inline-start:auto;color:var(--muted);transition:.2s;font-size:13px}.row.open .chev{transform:rotate(180deg)}
.detail{display:none;padding:0 16px 16px;border-top:1px dashed var(--line)}.row.open .detail{display:block}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
@media(max-width:640px){.cols{grid-template-columns:1fr}}
.panel{border-radius:10px;padding:13px 15px;position:relative}
.panel.orph{background:var(--orph)}.panel.edu{background:var(--edu)}
.panel.hl{box-shadow:0 0 0 2px var(--redBar)}
.panel h3{font-size:13px;margin-bottom:9px;display:flex;align-items:center;gap:6px}
.tag-surplus{position:absolute;top:11px;left:11px;font-size:10px;font-weight:700;background:var(--redBar);color:#fff;padding:2px 8px;border-radius:10px}
.f{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.05)}.f:last-child{border:none}
.f .k{color:#5a6675}.f .v{font-weight:600;text-align:left;direction:ltr;unicode-bidi:plaintext}
.copy{cursor:pointer;border:none;background:rgba(0,0,0,.07);border-radius:6px;padding:2px 8px;font-size:11px;font-family:inherit;margin-inline-start:6px}.copy:hover{background:rgba(0,0,0,.15)}
.done{margin-top:12px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.done label{font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;color:var(--muted)}
.who{font-size:12px;color:var(--greenInk)}
.row.checked{opacity:.6}.row.checked .name::after{content:" ✓";color:var(--greenBar)}
.empty{text-align:center;color:var(--muted);padding:40px;font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:99}.toast.show{opacity:1}
</style>
</head>
<body>
<div id="gate">
  <div class="box">
    <div style="font-size:40px;margin-bottom:6px">🔒</div>
    <h2>لوحة رصد الكفالات</h2>
    <p>الرجاء تسجيل الدخول للمتابعة</p>
    <div class="err" id="loginErr"></div>
    <input id="u" placeholder="اسم المستخدم" autocomplete="off">
    <input id="p" type="password" placeholder="كلمة المرور">
    <input id="nm" placeholder="اسمك (يظهر بجانب الحالات التي تتابعها)" autocomplete="off">
    <button id="loginBtn">دخول</button>
  </div>
</div>

<div id="app">
<div class="head">
  <div>
    <h1>لوحة رصد الكفالات المزدوجة</h1>

  <span class="sync off" id="syncBadge">⚪ غير مرتبط بقاعدة مشتركة</span>
</div>

<div class="secTitle">حسب المبلغ الشهري</div>
<div class="cards" id="cardsAmt"></div>

<div class="secTitle">حسب نوع الكفالة المزدوجة</div>
<div class="cards" id="cardsCase"></div>

<div class="toolbar">

  <span class="count" id="count"></span>
  <button class="btn" id="expandAll">توسيع الكل</button>
  <button class="btn" id="refreshBtn" style="display:none">↻ تحديث من القاعدة</button>
</div>

<div id="list"></div>
</div><!--/#app-->
<div class="toast" id="toast"></div>

  {key:'تتجاوز 75 — مراجعة',cls:'r',short:'تتجاوز 75$ — مراجعة'},
  {key:'أقل من 75',cls:'y',short:'أقل من 75$'},
  {key:'مثالية (=75)',cls:'g',short:'مثالية (=75$)'},
];
const caseMeta=k=>CASES.find(c=>c.key===k)||{cls:'k',badge:'b-k',short:k};
const uniq=rows=>new Set(rows.map(r=>r['الاسم'])).size;
let filterCase='ALL', filterAmt='ALL', query='';
const done={};   // id -> {by, ts}

function buildCardsAmt(){
  const el=document.getElementById('cardsAmt');
  let h=`<div class="card all ${filterAmt==='ALL'?'active':''}" data-a="ALL"><div class="num">${uniq(DATA)}</div><div class="lbl">كل الحالات</div></div>`;
  AMTS.forEach(a=>{const rows=DATA.filter(r=>r['حالة المبلغ']===a.key);
    h+=`<div class="card ${a.cls} ${filterAmt===a.key?'active':''}" data-a="${a.key}"><div class="num">${uniq(rows)}</div><div class="lbl">${a.short}</div></div>`;});
  // surplus location cards (within >75)
  const hi=DATA.filter(r=>r['حالة المبلغ']==='تتجاوز 75 — مراجعة');
  const so=hi.filter(r=>r['موقع الزيادة']==='الزيادة في الأيتام');
  const se=hi.filter(r=>r['موقع الزيادة']==='الزيادة في التعليم');
  h+=`<div class="card o ${filterAmt==='SURP_O'?'active':''}" data-a="SURP_O"><div class="num">${uniq(so)}</div><div class="lbl">الزيادة في الأيتام</div></div>`;
  h+=`<div class="card e ${filterAmt==='SURP_E'?'active':''}" data-a="SURP_E"><div class="num">${uniq(se)}</div><div class="lbl">الزيادة في التعليم</div></div>`;
  el.innerHTML=h;
  el.querySelectorAll('.card').forEach(c=>c.onclick=()=>{filterAmt=c.dataset.a;buildCardsAmt();buildCardsCase();render();});
}
function buildCardsCase(){
  const el=document.getElementById('cardsCase');
  let h=`<div class="card all ${filterCase==='ALL'?'active':''}" data-f="ALL"><div class="num">${uniq(DATA)}</div><div class="lbl">الكل</div></div>`;
  CASES.forEach(c=>{const rows=DATA.filter(r=>r['نوع الحالة']===c.key);
    h+=`<div class="card ${c.cls} ${filterCase===c.key?'active':''}" data-f="${c.key}"><div class="num">${uniq(rows)}</div><div class="lbl">${c.short}</div></div>`;});
  el.innerHTML=h;
  el.querySelectorAll('.card').forEach(c=>c.onclick=()=>{filterCase=c.dataset.f;buildCardsCase();render();});
}

function field(k,v,copy){
  v=(v===null||v===undefined||v==='')?'—':v;
  const cp=copy&&v!=='—'?`<button class="copy" data-copy="${v}">نسخ</button>`:'';
  return `<div class="f"><span class="k">${k}</span><span class="v">${v}${cp}</span></div>`;
}
function amtClass(s){return s.includes('تتجاوز')?'amt-hi':s.includes('أقل')?'amt-lo':'amt-ok';}
function surpBadge(s){
  if(s==='الزيادة في الأيتام')return '<span class="surp surp-o">▲ الزيادة في الأيتام</span>';
  if(s==='الزيادة في التعليم')return '<span class="surp surp-e">▲ الزيادة في التعليم</span>';
  return '';
}
function rowHTML(r){
  const m=caseMeta(r['نوع الحالة']),id=r['#'];
  const low=(r['دقة المطابقة']||'').includes('منخفضة');
  const dn=done[id];
  const hlO=r['موقع الزيادة']==='الزيادة في الأيتام';
  const hlE=r['موقع الزيادة']==='الزيادة في التعليم';
  return `<div class="row ${dn?'checked':''}" data-id="${id}">
    <div class="rhead">
      <span class="amt ${amtClass(r['حالة المبلغ'])}">${r['المجموع الشهري ($)']}$</span>
      <span class="badge ${m.badge}">${m.short}</span>
      <span class="name">${r['الاسم']}</span>
      ${surpBadge(r['موقع الزيادة'])}
      <span class="conf ${low?'low':''}">${r['دقة المطابقة']}</span>
      <span class="mini">أيتام #${r['رقم صندوق الأيتام']} · تعليم #${r['رقم صندوق التعليم']}</span>
      <span class="chev">▼</span>
    </div>
    <div class="detail">
      <div class="cols">
        <div class="panel orph ${hlO?'hl':''}">
          ${hlO?'<span class="tag-surplus">موقع الزيادة</span>':''}
          <h3>🟠 صندوق الأيتام — <b>${r['كفالة الأيتام الشهرية ($)']}$</b></h3>
          ${field('رقم الصندوق',r['رقم صندوق الأيتام'])}
          ${field('التصنيف',r['تصنيف الأيتام'])}
          ${field('الكفالة الشهرية ($)',r['كفالة الأيتام الشهرية ($)'])}
          ${field('الكفيل',r['كفيل الأيتام'])}
          ${field('بريد الكفيل',r['بريد كفيل الأيتام'],true)}
          ${field('المتطوع المسؤول',r['المتطوع المسؤول (أيتام)'])}
        </div>
        <div class="panel edu ${hlE?'hl':''}">
          ${hlE?'<span class="tag-surplus">موقع الزيادة</span>':''}
          <h3>🔵 صندوق التعليم — <b>${r['كفالة التعليم المطلوبة ($)']}$</b></h3>
          ${field('رقم الصندوق',r['رقم صندوق التعليم'])}
          ${field('المدرسة/الجامعة',r['مدرسة/جامعة التعليم'])}
          ${field('طالب يتيم؟',r['طالب يتيم؟'])}
          ${field('حالة الكفالة',r['حالة كفالة التعليم'])}
          ${field('المبلغ المطلوب ($)',r['كفالة التعليم المطلوبة ($)'])}
          ${field('الكفيل',r['كفيل التعليم'])}
          ${field('بريد الكفيل',r['بريد كفيل التعليم'],true)}
        </div>
      </div>
      <div class="done">
        <label><input type="checkbox" class="chk" ${dn?'checked':''} data-id="${id}"> تعليم كـ "تمّت المتابعة"</label>
        <span class="who" data-who="${id}">${dn?('✓ بواسطة '+dn.by):''}</span>
      </div>
    </div>
  </div>`;
}
function render(){
  let rows=DATA.slice();
  if(filterCase!=='ALL') rows=rows.filter(r=>r['نوع الحالة']===filterCase);
  if(filterAmt==='SURP_O') rows=rows.filter(r=>r['موقع الزيادة']==='الزيادة في الأيتام');
  else if(filterAmt==='SURP_E') rows=rows.filter(r=>r['موقع الزيادة']==='الزيادة في التعليم');
  else if(filterAmt!=='ALL') rows=rows.filter(r=>r['حالة المبلغ']===filterAmt);
  if(query){const q=query.trim().toLowerCase();
    rows=rows.filter(r=>['الاسم','كفيل الأيتام','بريد كفيل الأيتام','كفيل التعليم','بريد كفيل التعليم','رقم صندوق الأيتام','رقم صندوق التعليم'].some(k=>String(r[k]||'').toLowerCase().includes(q)));}
  document.getElementById('count').textContent=`عرض ${rows.length} سجل`;
  const list=document.getElementById('list');
  list.innerHTML=rows.length?rows.map(rowHTML).join(''):'<div class="empty">لا توجد نتائج مطابقة</div>';
  list.querySelectorAll('.rhead').forEach(h=>h.onclick=e=>{if(e.target.closest('.copy'))return;h.parentElement.classList.toggle('open');});
  list.querySelectorAll('.copy').forEach(b=>b.onclick=e=>{e.stopPropagation();navigator.clipboard.writeText(b.dataset.copy);toast('تم نسخ: '+b.dataset.copy);});
  list.querySelectorAll('.chk').forEach(c=>{c.onclick=e=>e.stopPropagation();c.onchange=e=>toggleDone(c.dataset.id,c.checked,c);});
}
function toggleDone(id,val,cb){
  if(val){done[id]={by:ME,ts:Date.now()};}else{delete done[id];}
  const row=cb.closest('.row');row.classList.toggle('checked',val);
  const who=row.querySelector('[data-who]');if(who)who.textContent=val?('✓ بواسطة '+ME):'';
  pushSync(id,val);
}

/* ---------- مزامنة Google Sheets ---------- */
function setBadge(state){
  const b=document.getElementById('syncBadge');
  if(state==='on'){b.className='sync on';b.textContent='🟢 مرتبط — المتابعة مشتركة';document.getElementById('refreshBtn').style.display='inline-block';}
  else if(state==='loading'){b.className='sync';b.textContent='⏳ جارٍ المزامنة...';}
  else{b.className='sync off';b.textContent='⚪ غير مرتبط (علامات محلية فقط)';}
}
async function initSync(){
  if(!SYNC_URL){setBadge('off');return;}
  setBadge('loading');
  try{
    const res=await fetch(SYNC_URL+'?action=get',{method:'GET'});
    const j=await res.json();
    Object.keys(done).forEach(k=>delete done[k]);
    (j.items||[]).forEach(it=>{done[it.id]={by:it.by,ts:it.ts};});
    setBadge('on');render();
  }catch(e){setBadge('off');toast('تعذّر الاتصال بالقاعدة — تعمل محلياً');}
}
async function pushSync(id,val){
  if(!SYNC_URL)return;
  try{
    await fetch(SYNC_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'set',id:String(id),done:val,by:ME})});
  }catch(e){toast('تعذّر حفظ الحالة في القاعدة');}
}
document.getElementById('refreshBtn').onclick=initSync;

let allOpen=false;
document.getElementById('expandAll').onclick=()=>{allOpen=!allOpen;document.querySelectorAll('.row').forEach(r=>r.classList.toggle('open',allOpen));document.getElementById('expandAll').textContent=allOpen?'طي الكل':'توسيع الكل';};
document.getElementById('q').oninput=e=>{query=e.target.value;render();};
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}

buildCardsAmt();buildCardsCase();render();
if(sessionStorage.getItem('auth')==='1')initSync();
</script>
</body>
</html>
